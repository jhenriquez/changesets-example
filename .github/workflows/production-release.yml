name: Production Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create Release Versions PR
    runs-on: ubuntu-latest
    # Skip if the push is from the changesets release branch or from a Version PR merger
    if: ${{ !contains(github.event.head_commit.message, 'changeset-release/main') }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run final versioning (exit pre + version)
        run: npm run version:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Create PR with version changes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Version packages
          title: Release Version Packages
          body: |
            This PR finalizes versions for production:
            - Exited prerelease mode
            - Applied Changesets versioning and updated CHANGELOG
          branch: changeset-release/main
          delete-branch: true
          labels: release
          draft: false
