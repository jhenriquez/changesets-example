name: Production Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create Release Versions PR
    runs-on: ubuntu-latest
    # Skip if the push is from the changesets release branch or from a Version PR merger
    if: ${{ !contains(github.event.head_commit.message, 'changeset-release/main') }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Exists Prerelease and Creates The Versions Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version:release
          title: 'Release Version Packages'
          commit: 'Version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}